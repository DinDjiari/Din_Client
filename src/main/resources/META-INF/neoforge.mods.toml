modLoader = "javafml"
loaderVersion = "[4,)"
license = "${mod_license}"
issueTrackerURL = "https://github.com/DinDjiari/Din_Client-/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''
${mod_description}
'''

# Client-side only. The mod is compiled and loaded only on the physical client
# (see @Mod(dist = Dist.CLIENT)); it adds no packets and no protocol changes.
[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[${neo_version},)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version},1.22)"
ordering = "NONE"
side = "CLIENT"

# Sodium (Modrinth project AANobbMI) is recommended for significantly better
# FPS and ships native NeoForge builds for 1.21.1 (mc1.21.1-0.8.x-neoforge).
# Strictly optional: the client only detects it via ModList and never touches
# its code, so everything works identically without it.
[[dependencies.${mod_id}]]
modId = "sodium"
type = "optional"
versionRange = "[0.6,)"
ordering = "NONE"
side = "CLIENT"
